name: Build LEDE

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '30 19 3 * *'
permissions: 
  contents: write
env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_NAME: lede
  WORKDIR: lede
  CCACHE_DIR: ccache_lede
  CCACHE_MAXSIZE: 10G

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Space cleanup and Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E timedatectl set-timezone "Asia/Singapore"
          date
          df -h
          sudo -E rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /etc/mysql /etc/php
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo docker image prune --all --force
          df -h

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Check disk space again
        run: |
          df -h

      - name: Clone source
        run: |
          git clone --depth=1 $REPO_URL $WORKDIR

      - name: Feeds update
        run: |
          cd $WORKDIR
          sed -i '1i src-git helloworld https://github.com/fw876/helloworld.git' ./feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd $WORKDIR
          pwd
          ls -al $GITHUB_WORKSPACE
          sed -i 's/192.168.1.1/10.0.3.1/g' package/base-files/files/bin/config_generate
          sed -i 's/255.255.255.0/255.255.240.0/g' package/base-files/files/bin/config_generate
          sed -i 's/LEDE/Netlab/g' package/base-files/files/bin/config_generate
          mv $GITHUB_WORKSPACE/.config $WORKDIR/.config  
          make defconfig 

      - name: Download packages
        run: |
          cd $WORKDIR
          make download -j16

      - name: Compile
        run: |
          cd $WORKDIR
          echo -e "$(nproc) thread compile"
          echo "======================="
          echo "last check disk space"
          df -h
          echo "======================="
          export PATH="/usr/lib/ccache:$PATH"
          export CCACHE_DIR=$CCACHE_DIR
          ccache -M $CCACHE_MAXSIZE
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1 ./ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir
          du -h --max-depth=1 ./bin

      - name: Prepare firmware artifact
        run: |
          cd $WORKDIR
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          rm -rf $(find ./bin/targets/ -type d -name "packages")

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware
          path: ${{ env.WORKDIR }}/bin/targets/


      - name: Prepare package artifact
        run: |
          cd $WORKDIR
          mv $(find ./bin/packages/ -type f -name "*.ipk") ./artifact/package/

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_package
          path: ${{ env.WORKDIR }}/artifact/package/

      - name: Prepare buildinfo artifact
        run: |
          cd $WORKDIR
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/

      - name: Upload buildinfo
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_buildinfo
          path: ${{ env.WORKDIR }}/artifact/buildinfo/
